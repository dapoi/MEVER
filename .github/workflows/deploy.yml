name: Build & Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.actor == 'dapoi'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up env.properties
        run: |
          echo "ADMOB_ID=${{ secrets.ADMOB_ID }}" >> env.properties
          echo "AD_BANNER_UNIT_ID=${{ secrets.AD_BANNER_UNIT_ID }}" >> env.properties
          echo "AD_INTERSTITIAL_UNIT_ID=${{ secrets.AD_INTERSTITIAL_UNIT_ID }}" >> env.properties
          echo "API_KEY_DEBUG=${{ secrets.API_KEY_DEBUG }}" >> env.properties
          echo "BASE_URL_DEBUG=${{ secrets.BASE_URL_DEBUG }}" >> env.properties
          echo "BASE_URL_RELEASE=${{ secrets.BASE_URL_RELEASE }}" >> env.properties

      - name: Decode Keystore
        run: |
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 --decode > ${{ github.workspace }}/keystore.jks

      - name: Build Release AAB & APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          VERSION_NAME="${{ github.ref_name }}"
          VERSION_NAME="${VERSION_NAME#v}"
          VERSION_CODE=$((20260701 + ${{ github.run_number }}))
          
          echo "Building version $VERSION_NAME ($VERSION_CODE)"

          ./gradlew bundleRelease assembleRelease \
            -PversionName="$VERSION_NAME" \
            -PversionCode="$VERSION_CODE"

      - name: Determine Flags
        id: flags
        run: |
          git fetch --tags --force

          if [[ "${{ github.ref_name }}" == *"-beta"* ]]; then
            echo "track=beta" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "track=production" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

          TAG_MESSAGE=$(git for-each-ref --format='%(contents)' "refs/tags/${{ github.ref_name }}")
          
          echo "Debug: Tag name is ${{ github.ref_name }}"
          echo "Debug: Tag message content: $TAG_MESSAGE"

          if [[ "$TAG_MESSAGE" == *"upload_play_store=true"* ]]; then
            echo "upload_play_store=true" >> $GITHUB_OUTPUT
          else
            echo "upload_play_store=false" >> $GITHUB_OUTPUT
          fi

          if [[ "$TAG_MESSAGE" == *"upload_github_release=true"* ]]; then
            echo "upload_github_release=true" >> $GITHUB_OUTPUT
          else
            echo "upload_github_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Prepare What's New
        id: whatsnew
        run: |
          find distribution/whatsnew -type f -exec sed -i -E 's/^[0-9]+:- //g' {} +
          
          NOTES_FILE="distribution/whatsnew/whatsnew-en-US"
          if [ -f "$NOTES_FILE" ]; then
            NOTES=$(cat "$NOTES_FILE")
          else
            NOTES="Release ${{ github.ref_name }}"
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload to Play Store
        if: steps.flags.outputs.upload_play_store == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.dapascript.mever
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ steps.flags.outputs.track }}
          status: completed
          whatsNewDirectory: distribution/whatsnew

      - name: Create GitHub Release
        if: steps.flags.outputs.upload_github_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.whatsnew.outputs.notes }}
          prerelease: ${{ steps.flags.outputs.prerelease }}
          files: app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}